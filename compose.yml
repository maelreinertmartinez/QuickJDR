services:
  client:
    build:
      context: client
      dockerfile: Dockerfile
      target: dev
    ports:
      - 5173:5173
    volumes:
      - ./client:/app
    environment:
      - VITE_API_URL=http://127.0.0.1:8000
    depends_on:
      - backend

  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    ports:
      - 8000:8000
    volumes:
      - ./backend:/app
    environment:
      - APP_ENV=development
      - DB_HOST=database
      - DB_PORT=5432
      - DB_DATABASE=quickjdr
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
    depends_on:
      - database
    networks:
      - quick-jdr-network
    
  database:
    image: postgres:17-alpine
    volumes:
      - ./database:/var/lib/postgresql/data
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=quickjdr
    networks:
      - quick-jdr-network

networks:
  quick-jdr-network:
    driver: bridge